---
- name: Generate temporary kubeadm join command
  hosts: k8s_control_plane
  gather_facts: false

  tasks:
    - name: Generate kubeadm join command with temporary token
      ansible.builtin.command: >
        kubeadm token create
        --ttl 2h
        --description "temporary token generated by Ansible for worker join"
        --print-join-command
      register: join_command_result
      changed_when: true
      become: true

    - name: Store join command in Ansible memory
      ansible.builtin.set_fact:
        kubeadm_join_command: "{{ join_command_result.stdout }}"

- name: Join Kubernetes worker nodes
  hosts: k8s_workers
  gather_facts: true

  vars:
    kubeadm_join_command: "{{ hostvars[groups['k8s_control_plane'][0]].kubeadm_join_command }}"

  roles:
    - k8s_workers

- name: Show Kubernetes nodes after workers join
  hosts: k8s_control_plane
  gather_facts: false

  tasks:
    - name: Get Kubernetes nodes
      ansible.builtin.command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
      register: cluster_nodes
      changed_when: false
      become: true
      become_user: "{{ admin_user }}"

    - name: Display Kubernetes nodes
      ansible.builtin.debug:
        var: cluster_nodes.stdout_lines
