---
- name: Check Helm is installed
  ansible.builtin.command: helm version --short
  register: helm_check
  changed_when: false

- name: Add Headlamp Helm repository
  ansible.builtin.command: >
    helm repo add {{ headlamp_repo_name }} {{ headlamp_repo_url }}
  register: headlamp_repo_add
  changed_when: "'has been added' in headlamp_repo_add.stdout"
  failed_when:
    - headlamp_repo_add.rc != 0
    - "'already exists' not in headlamp_repo_add.stderr"

- name: Update Helm repositories
  ansible.builtin.command: helm repo update
  changed_when: false

- name: Install or upgrade Headlamp
  ansible.builtin.command: >
    helm upgrade --install {{ headlamp_release_name }} {{ headlamp_chart }}
    --create-namespace
    --namespace {{ headlamp_namespace }}
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  register: headlamp_install
  changed_when: >
    'has been upgraded' in headlamp_install.stdout or
    'has been installed' in headlamp_install.stdout
  become: true
  become_user: "{{ admin_user }}"

- name: Show Headlamp install result
  ansible.builtin.debug:
    var: headlamp_install.stdout_lines

- name: Render Headlamp admin user manifest
  ansible.builtin.template:
    src: admin-user.yml.j2
    dest: "{{ headlamp_admin_manifest_path }}"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"
  become: true

- name: Apply Headlamp admin user manifest
  ansible.builtin.command: kubectl apply -f {{ headlamp_admin_manifest_path }}
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  register: headlamp_admin_apply
  changed_when: >
    'created' in headlamp_admin_apply.stdout or
    'configured' in headlamp_admin_apply.stdout
  become: true
  become_user: "{{ admin_user }}"

- name: Show Headlamp admin user apply result
  ansible.builtin.debug:
    var: headlamp_admin_apply.stdout_lines

- name: Wait for Headlamp pods to be ready
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready pods
    -l app.kubernetes.io/instance={{ headlamp_release_name }}
    -n {{ headlamp_namespace }}
    --timeout=300s
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  changed_when: false
  become: true
  become_user: "{{ admin_user }}"

- name: Show Headlamp pods
  ansible.builtin.command: kubectl get pods -n {{ headlamp_namespace }} -o wide
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  register: headlamp_pods
  changed_when: false
  become: true
  become_user: "{{ admin_user }}"

- name: Display Headlamp pods
  ansible.builtin.debug:
    var: headlamp_pods.stdout_lines

- name: Show Headlamp services
  ansible.builtin.command: kubectl get svc -n {{ headlamp_namespace }}
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  register: headlamp_services
  changed_when: false
  become: true
  become_user: "{{ admin_user }}"

- name: Display Headlamp services
  ansible.builtin.debug:
    var: headlamp_services.stdout_lines
