---
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: true
  become: true

- name: Disable swap permanently in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'
  become: true

- name: Configure Kubernetes kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Load overlay module
  ansible.builtin.command: modprobe overlay
  changed_when: false
  become: true

- name: Load br_netfilter module
  ansible.builtin.command: modprobe br_netfilter
  changed_when: false
  become: true

- name: Configure Kubernetes sysctl parameters
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    owner: root
    group: root
    mode: "0644"
  notify: Apply sysctl settings
  become: true

- name: Install containerd
  ansible.builtin.apt:
    name: containerd
    state: present
    update_cache: true
  become: true

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Generate default containerd configuration
  ansible.builtin.shell: containerd config default > {{ containerd_config_file }}
  args:
    creates: "{{ containerd_config_file }}"
  become: true

- name: Configure containerd to use systemd cgroup driver
  ansible.builtin.replace:
    path: "{{ containerd_config_file }}"
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd
  become: true

- name: Ensure containerd is enabled and running
  ansible.builtin.service:
    name: containerd
    state: started
    enabled: true
  become: true

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Download Kubernetes repository key
  ansible.builtin.shell: |
    curl -fsSL {{ kubernetes_apt_repo }}Release.key | gpg --dearmor -o {{ kubernetes_apt_keyring }}
  args:
    creates: "{{ kubernetes_apt_keyring }}"
  become: true

- name: Add Kubernetes APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ kubernetes_apt_keyring }}] {{ kubernetes_apt_repo }} /"
    filename: kubernetes
    state: present
  become: true

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name: "{{ kubernetes_packages }}"
    state: present
    update_cache: true
  become: true

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_packages }}"
  become: true

- name: Enable kubelet service
  ansible.builtin.service:
    name: kubelet
    enabled: true
  become: true
