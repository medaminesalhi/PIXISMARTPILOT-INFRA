---
- name: Install HAProxy
  ansible.builtin.apt:
    name: haproxy
    state: present
    update_cache: true
  become: true

- name: Deploy HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
  notify: Restart haproxy
  become: true

- name: Validate HAProxy configuration
  ansible.builtin.command: haproxy -c -f /etc/haproxy/haproxy.cfg
  changed_when: false
  become: true

- name: Run HAProxy handlers now
  ansible.builtin.meta: flush_handlers

- name: Restart HAProxy after validated configuration
  ansible.builtin.service:
    name: haproxy
    state: restarted
    enabled: true
  become: true
- name: Check HAProxy is listening on port 80
  ansible.builtin.command: ss -lntp
  register: haproxy_ports
  changed_when: false
  become: true

- name: Display listening ports
  ansible.builtin.debug:
    var: haproxy_ports.stdout_lines

- name: Test HAProxy to Headlamp through Ingress
  ansible.builtin.command: >
    curl -I -H "Host: headlamp.pixismart.local" http://127.0.0.1:{{ haproxy_frontend_http_port }}
  register: haproxy_headlamp_test
  changed_when: false
  failed_when: haproxy_headlamp_test.rc != 0
  become: true

- name: Display HAProxy Headlamp test result
  ansible.builtin.debug:
    var: haproxy_headlamp_test.stdout_lines
